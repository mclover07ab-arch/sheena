const getUserId = () => {
  let id = localStorage.getItem('sfi_user_id');
  
  // Si no existe un ID guardado en este navegador, lo solicita
  if (!id) {
    id = prompt("Bienvenido a Sheena Financial.\nPor favor, ingresa tu número de identificación nacional (Cédula) para sincronizar tus datos:");
    
    // Validación: si no ingresa nada, genera un ID temporal para evitar errores
    if (!id || id.trim() === "") {
      alert("No ingresaste un ID. Usaremos uno temporal. Para cambiarlo, limpia los datos del navegador.");
      id = 'temp_' + Math.random().toString(36).substr(2, 9);
    }
    
    // Guarda el ID (Cédula) de forma permanente en este navegador
    localStorage.setItem('sfi_user_id', id.trim());
  }
  return id;
};

async function syncDataToSheets(appData) {
  try {
    const payload = { 
      token: CLOUD_TOKEN, 
      action: "SAVE", 
      userId: getUserId(), 
      payload: appData 
    };

    const formData = new URLSearchParams();
    formData.append("json", JSON.stringify(payload)); // <-- IMPORTANTE: el nombre 'json'

    await fetch(CLOUD_API_URL, {
      method: "POST",
      mode: "no-cors", 
      body: formData
    });

    console.log("✅ Sincronización enviada para: " + getUserId());
  } catch (error) {
    console.error("❌ Error:", error);
  }

async function loadDataFromSheets() {
  try {
    // Le pedimos a Google los datos filtrando por nuestro ID único
    const response = await fetch(`${CLOUD_API_URL}?userId=${getUserId()}`);
    const remoteData = await response.json();

      if (confirm("¿Deseas recuperar TUS datos guardados en la nube?")) {

      alert("No se encontraron datos previos para tu usuario en la nube.");
    }
  } catch (error) {
    console.error("Error al cargar:", error);

// ── Auto-saldo helper ──────────────────────────────────────────────────────
function applyMovEffect(creditos,mov,sign){
  if(!mov||!mov.creditoId) return creditos;
  const isTCBuy=mov.tipo==='Gasto'&&mov.medioPago==='Tarjeta Crédito';
  const isPayment=mov.categoria==='Cuota crédito';
  if(!isTCBuy&&!isPayment) return creditos;
  return creditos.map(c=>{
    if(c.id!==mov.creditoId) return c;
    const delta=isTCBuy ? sign*mov.monto : -sign*mov.monto;
    return {...c,saldo:Math.max(0,c.saldo+delta)};
  });
}

// ── Context & Reducer ──────────────────────────────────────────────────────
const AppCtx=createContext(null);
const useApp=()=>useContext(AppCtx);
function reducer(state,{type,...p}){
  const ui=patch=>({...state,inversiones:{...state.inversiones,...patch}});
  switch(type){
    case 'UPD_PARAM':    return {...state,params:{...state.params,[p.key]:p.val}};
    case 'UPD_EFECTIVO': return {...state,efectivo:p.val};
    case 'UPD_CAT':      return {...state,categorias:state.categorias.map(c=>c.nombre===p.nombre?{...c,presupuesto:p.val}:c)};
    case 'UPD_AHORRO':   return {...state,ahorro:{...state.ahorro,[p.key]:p.val}};
    case 'UPD_CRED':     return {...state,creditos:state.creditos.map(c=>c.id===p.id?{...c,[p.key]:p.str?p.val:(parseFloat(p.val)||0)}:c)};
    case 'ADD_CRED':     return {...state,creditos:[...state.creditos,{...p.cred,id:state.nextCredId}],nextCredId:state.nextCredId+1};
    case 'DEL_CRED':     return {...state,creditos:state.creditos.filter(c=>c.id!==p.id)};
    case 'ADD_MOV':{
      const mov={...p.mov,id:state.nextMovId};
      return{...state,movimientos:[mov,...state.movimientos],nextMovId:state.nextMovId+1,creditos:applyMovEffect(state.creditos,mov,+1)};
    }
    case 'DEL_MOV':{
      const mov=state.movimientos.find(m=>m.id===p.id);
      return{...state,movimientos:state.movimientos.filter(m=>m.id!==p.id),creditos:applyMovEffect(state.creditos,mov,-1)};
    }
    case 'SAVE_MOV':{
      const oldMov=state.movimientos.find(m=>m.id===p.id);
      const newMov={...oldMov,...p.data};
      let creds=applyMovEffect(state.creditos,oldMov,-1);
      creds=applyMovEffect(creds,newMov,+1);
      return{...state,movimientos:state.movimientos.map(m=>m.id===p.id?{...m,...p.data}:m),creditos:creds};
    }
    case 'ADD_CDT':      return ui({cdts:[...state.inversiones.cdts,{...p.cdt,id:state.inversiones.nextId}],nextId:state.inversiones.nextId+1});
    case 'DEL_CDT':      return ui({cdts:state.inversiones.cdts.filter(c=>c.id!==p.id)});
    case 'ADD_DOLAR':    return ui({dolares:[...state.inversiones.dolares,{...p.d,id:state.inversiones.nextId}],nextId:state.inversiones.nextId+1});
    case 'DEL_DOLAR':    return ui({dolares:state.inversiones.dolares.filter(d=>d.id!==p.id)});
    case 'ADD_ACCION':   return ui({acciones:[...state.inversiones.acciones,{...p.a,id:state.inversiones.nextId}],nextId:state.inversiones.nextId+1});
    case 'DEL_ACCION':   return ui({acciones:state.inversiones.acciones.filter(a=>a.id!==p.id)});
    case 'UPD_ACCION':   return ui({acciones:state.inversiones.acciones.map(a=>a.id===p.id?{...a,[p.key]:p.val}:a)});
    case 'ADD_CRYPTO':   return ui({crypto:[...state.inversiones.crypto,{...p.c,id:state.inversiones.nextId}],nextId:state.inversiones.nextId+1});
    case 'DEL_CRYPTO':   return ui({crypto:state.inversiones.crypto.filter(c=>c.id!==p.id)});
    case 'UPD_CRYPTO':   return ui({crypto:state.inversiones.crypto.map(c=>c.id===p.id?{...c,[p.key]:p.val}:c)});
    case 'RESET':        return DEF;
    default:             return state;
  }
}

// ── Calc ───────────────────────────────────────────────────────────────────
function calcAll(data){
  const{params,creditos,ahorro,categorias,inversiones,efectivo}=data;
  const descSS=params.salarioBase*params.pctSS;
  const ingresoNeto=params.salarioBase-descSS+params.ingAdicional;
  const creditosCalc=creditos.filter(c=>c.saldo>0).map(c=>{
    const isDP=(c.tipoProducto||'')==='Deuda Personal';
    const isTC=(c.tipoProducto||'')==='Tarjeta de Crédito';
    const rate=mrFn(isDP?0:c.tasaEA);
    const cuotasT=c.cuotasTotales||0,cuotasP=c.cuotasPagadas||0;
    const rest=cuotasT>0?Math.max(1,cuotasT-cuotasP):0;
    const base=isTC&&cuotasT===0?Math.max(c.saldo*(rate+0.01),50000):pmt(rate,Math.max(1,rest||36),c.saldo);
    const abonoMensual=(c.abonoTipo||'mensual')==='mensual'?(c.abono||0):0;
    return{...c,rate,cuotasRestantes:rest,cuotaBase:base,cuotaTotal:base+abonoMensual,isTC,isDP,cupoTotal:c.cupoTotal||0,abonoTipo:c.abonoTipo||'mensual'};
  });
  const deudaTotal=creditosCalc.reduce((s,c)=>s+c.saldo,0);
  const cuotasTotal=creditosCalc.reduce((s,c)=>s+c.cuotaTotal,0);
  const dti=ingresoNeto>0?cuotasTotal/ingresoNeto:0;
  let s=ahorro.saldoInicial;const aR=mrFn(ahorro.tasaEA);
  const ahorroProj=Array.from({length:13},(_,i)=>{const v={mes:i,saldo:Math.round(s)};if(i<12)s=s*(1+aR)+ahorro.cuota;return v;});
  const saldoAhorroActual=ahorroProj[0].saldo;
  const gastosTotal=categorias.reduce((a,c)=>a+c.presupuesto,0);
  const flujoCaja=ingresoNeto-gastosTotal-cuotasTotal;
  const totalCDT=inversiones.cdts.reduce((s,c)=>{const d=Math.max(0,(Date.now()-new Date(c.fechaInicio))/864e5);return s+c.monto*Math.pow(1+c.tasaEA,d/365);},0);
  const totalDolares=inversiones.dolares.reduce((s,d)=>s+d.cantidadUSD*params.trm,0);
  const totalAcciones=inversiones.acciones.reduce((s,a)=>s+a.precioActual*a.cantidad,0);
  const totalCrypto=(inversiones.crypto||[]).reduce((s,c)=>s+c.cantidadUnits*c.precioActualUSD*params.trm,0);
  const totalPortafolio=totalCDT+totalDolares+totalAcciones+totalCrypto;
  const patrimonioNeto=saldoAhorroActual+efectivo+totalPortafolio-deudaTotal;
  return{ingresoNeto,creditosCalc,deudaTotal,cuotasTotal,dti,ahorroProj,saldoAhorroActual,gastosTotal,flujoCaja,patrimonioNeto,totalPortafolio,totalCDT,totalDolares,totalAcciones,totalCrypto};
}

// ── Amortization (ocasional support) ──────────────────────────────────────
function computeSched(saldo,rate,cuotaBase,extraPago,maxRows,ocasional=false){
  if(!saldo||cuotaBase<=0)return[];
  const rows=[];let s=saldo;
  for(let i=1;s>0.5&&i<=maxRows;i++){
    const ep=ocasional?(i===1?extraPago:0):extraPago;
    const interes=s*rate,cuota=Math.min(cuotaBase+ep,s+interes),cap=Math.max(0,cuota-interes),sf=Math.max(0,s-cap);
    rows.push({p:i,s:Math.round(s),q:Math.round(cuota),i:Math.round(interes),k:Math.round(cap),sf:Math.round(sf)});
    s=sf;
  }
  return rows;
}

function computeHistorical(movimientos){
  const months={};
  movimientos.forEach(m=>{const key=m.fecha.substring(0,7);if(!months[key])months[key]={ingreso:0,gasto:0};if(m.tipo==='Ingreso')months[key].ingreso+=m.monto;if(m.tipo==='Gasto')months[key].gasto+=m.monto;});
  return Object.entries(months).sort(([a],[b])=>a.localeCompare(b)).slice(-12).map(([key,v])=>{const[y,m]=key.split('-');return{key,label:`${MON[parseInt(m)-1]}'${y.slice(2)}`,ingreso:v.ingreso,gasto:v.gasto,neto:v.ingreso-v.gasto};});
}

function suggestCuts(categorias,excess){
  if(excess<=0)return[];
  const vars=[...categorias].filter(c=>c.tipo==='Variable'&&c.presupuesto>0).sort((a,b)=>b.presupuesto-a.presupuesto);
  let rem=excess;const cuts=[];
  for(const cat of vars){if(rem<=0)break;const corte=Math.min(Math.round(cat.presupuesto*.4),rem);if(corte>0){cuts.push({nombre:cat.nombre,actual:cat.presupuesto,corte,sugerido:cat.presupuesto-corte});rem-=corte;}}
  return cuts;
}

// ── Creditos ───────────────────────────────────────────────────────────────
function Creditos(){
  const{data,calc,dispatch}=useApp();
  const FORM0={tipoProducto:'Libre Inversión',nombre:'',nombreMarca:'',entidad:'',saldo:'',tasaEA:'',cuotasTotales:'',cuotasPagadas:'0',cupoTotal:'',cuotaFija:''};
  const[form,setForm]=useState(FORM0);
  const[show,setShow]=useState(false);
  const fv=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const isTC=form.tipoProducto==='Tarjeta de Crédito';
  const isDP=form.tipoProducto==='Deuda Personal';
  const tipoInfo=getTC(form.tipoProducto);
  const tipoBorder={danger:'var(--danger)',ok:'var(--teal)',warn:'var(--warning)',info:'var(--blue)'}[tipoInfo.colorS]||'var(--blue)';

  function doAdd(){
    if(!form.saldo)return;
    let cred;
    if(isDP){
      if(!form.nombre||!form.cuotaFija)return;
      const cf=+form.cuotaFija||1,ct=Math.ceil(+form.saldo/cf);
      cred={tipoProducto:form.tipoProducto,nombre:form.nombre,nombreMarca:'',entidad:'',saldo:+form.saldo,tasaEA:0,cuotasTotales:ct,cuotasPagadas:+form.cuotasPagadas||0,abono:0,abonoTipo:'mensual',cupoTotal:0};
    } else if(isTC){
      if(!form.tasaEA)return;
      cred={tipoProducto:form.tipoProducto,nombre:form.nombreMarca||'Tarjeta de Crédito',nombreMarca:form.nombreMarca,entidad:form.entidad,saldo:+form.saldo,tasaEA:+form.tasaEA/100,cuotasTotales:+form.cuotasTotales||0,cuotasPagadas:0,abono:0,abonoTipo:'mensual',cupoTotal:+form.cupoTotal||0};
    } else {
      if(!form.nombre||!form.tasaEA||!form.cuotasTotales)return;
      cred={tipoProducto:form.tipoProducto,nombre:form.nombre,nombreMarca:'',entidad:form.entidad,saldo:+form.saldo,tasaEA:+form.tasaEA/100,cuotasTotales:+form.cuotasTotales,cuotasPagadas:+form.cuotasPagadas||0,abono:0,abonoTipo:'mensual',cupoTotal:0};
    }
    dispatch({type:'ADD_CRED',cred});
    setForm({...FORM0,tipoProducto:form.tipoProducto});setShow(false);
  }

  // Consumos TC (for history section)
  const anos=useMemo(()=>anosUnicos(data.movimientos),[data.movimientos]);
  const curY=String(new Date().getFullYear());
  const[anio,setAnio]=useState(anos.includes(curY)?curY:(anos[0]||'todos'));
  const[mes,setMes]=useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const[expTC,setExpTC]=useState(null);
  const consumosPorTC=useMemo(()=>{
    const mf=filtrarMovs(data.movimientos,anio,mes,'todos','todas','todos');
    const by={};mf.filter(m=>m.medioPago==='Tarjeta Crédito'&&m.creditoId).forEach(m=>{if(!by[m.creditoId])by[m.creditoId]={total:0,items:[]};by[m.creditoId].total+=m.monto;by[m.creditoId].items.push(m);});
    return by;
  },[data.movimientos,anio,mes]);
  const totTC=Object.values(consumosPorTC).reduce((s,v)=>s+v.total,0);

  // Amortización
  const[amId,setAmId]=useState(null);
  const[amView,setAmView]=useState('original'); // 'original' | 'abono' | 'simulacion'
  const[simCuotas,setSimCuotas]=useState('');
  const amCred=useMemo(()=>calc.creditosCalc.find(x=>x.id===amId),[amId,calc.creditosCalc]);
  const amRows = useMemo(() => { if (!amCred || amCred.cuotasRestantes <= 0) return []; const maxCuotas = amCred.tipoProducto === 'Hipotecario' ? 240 : 60; return computeSched(amCred.saldo, amCred.rate, amCred.cuotaBase, 0, Math.min(amCred.cuotasRestantes, maxCuotas)); }, [amCred]);
  const amRowsAbono=useMemo(()=>{
    if(!amCred||amCred.cuotasRestantes===0||!amCred.abono)return[];
    const ocasional=(amCred.abonoTipo||'mensual')==='ocasional';
    return computeSched(amCred.saldo,amCred.rate,amCred.cuotaBase,amCred.abono,Math.min(amCred.cuotasRestantes,60),ocasional);
  },[amCred]);
  const savings=useMemo(()=>{if(!amRows.length||!amRowsAbono.length)return null;return{mesesAhorrados:amRows.length-amRowsAbono.length,interesAhorrado:amRows.reduce((s,r)=>s+r.i,0)-amRowsAbono.reduce((s,r)=>s+r.i,0)};},[amRows,amRowsAbono]);
  // Simulación por cambio de cuotas
  const simN=parseInt(simCuotas)||0;
  const simCuotaBase=useMemo(()=>amCred&&simN>0?pmt(amCred.rate,simN,amCred.saldo):0,[amCred,simN]);
  const amRowsSim = useMemo(() => amCred && simN > 0 ? computeSched(amCred.saldo, amCred.rate, simCuotaBase, 0, Math.min(simN, 240)) : [], [amCred, simN, simCuotaBase]);
  const simCompar=useMemo(()=>{
    if(!amRows.length||!amRowsSim.length)return null;
    const iO=amRows.reduce((s,r)=>s+r.i,0),iS=amRowsSim.reduce((s,r)=>s+r.i,0);
    return{cuotasDiff:amRows.length-amRowsSim.length,interesDiff:iO-iS,cuotaBaseDiff:simCuotaBase-amCred.cuotaBase};
  },[amRows,amRowsSim,simCuotaBase,amCred]);
  const activeSched=amView==='abono'&&amRowsAbono.length>0?amRowsAbono:amView==='simulacion'&&amRowsSim.length>0?amRowsSim:amRows;

  return DIV({style:{display:'flex',flexDirection:'column',gap:'1.5rem'}},
    DIV({style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
      h(SecTitle,{title:'Portafolio de compromisos crediticios',sub:`${calc.creditosCalc.length} productos · DTI ${pct(calc.dti)}`}),
      BTN({style:cBtnS,onClick:()=>setShow(!show)},show?'Cancelar':'+ Agregar producto')
    ),

    // ── Formulario ────────────────────────────────────────────────────────
    show&&DIV({style:{...cCard,borderTop:`3px solid ${tipoBorder}`}},
      h(SecTitle,{title:'Nuevo producto crediticio',sub:`${tipoInfo.icon} ${tipoInfo.desc}`}),
      DIV({style:{marginBottom:14}},
        LBL({style:{...cLbl,fontSize:13,fontWeight:500}},'Tipo de producto financiero'),
        SEL({value:form.tipoProducto,style:{fontSize:14,fontWeight:500},onChange:e=>setForm({...FORM0,tipoProducto:e.target.value})},
          ...TIPOS_CREDITO.map(t=>OPT({key:t.id,value:t.id},`${t.icon}  ${t.id} — ${t.desc}`))
        )
      ),
      isDP
        ?DIV({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
            DIV(null,LBL({style:cLbl},'Nombre del acreedor'),INP({value:form.nombre,onChange:fv('nombre'),placeholder:'Nombre del acreedor'})),
            DIV(null,LBL({style:cLbl},'Saldo actual ($)'),INP({type:'number',value:form.saldo,onChange:fv('saldo'),placeholder:'1500000'})),
            DIV(null,LBL({style:cLbl},'Cuota mensual acordada ($)'),INP({type:'number',value:form.cuotaFija,onChange:fv('cuotaFija'),placeholder:'200000'})),
            DIV(null,LBL({style:cLbl},'Cuotas ya pagadas'),INP({type:'number',value:form.cuotasPagadas,onChange:fv('cuotasPagadas')}))
          )
        :isTC
          ?DIV({style:cG3},
              DIV(null,LBL({style:cLbl},'Franquicia / marca de la tarjeta'),SEL({value:form.nombreMarca,onChange:fv('nombreMarca')},OPT({value:''},'— Selecciona franquicia —'),...MARCAS_TC.map(m=>OPT({key:m,value:m},m)))),
              DIV(null,LBL({style:cLbl},'Entidad bancaria'),SEL({value:form.entidad,onChange:fv('entidad')},OPT({value:''},'— Selecciona banco —'),...BANCOS_CO.map(b=>OPT({key:b,value:b},b)))),
              DIV(null,LBL({style:cLbl},'Saldo actual ($)'),INP({type:'number',value:form.saldo,onChange:fv('saldo'),placeholder:'1500000'})),
              DIV(null,LBL({style:cLbl},'Tasa EA (%)'),INP({type:'number',step:'.1',value:form.tasaEA,onChange:fv('tasaEA'),placeholder:'28.5'})),
              DIV(null,LBL({style:cLbl},'Cupo total ($)'),INP({type:'number',value:form.cupoTotal,onChange:fv('cupoTotal'),placeholder:'3000000'})),
              DIV(null,LBL({style:cLbl},'Cuotas diferidas (0 = pago mínimo)'),INP({type:'number',value:form.cuotasTotales,onChange:fv('cuotasTotales'),placeholder:'0'}))
            )
          :DIV({style:cG3},
              DIV(null,LBL({style:cLbl},'Nombre del producto'),INP({value:form.nombre,onChange:fv('nombre'),placeholder:'Crédito libre inversión'})),
              DIV(null,LBL({style:cLbl},'Entidad bancaria'),SEL({value:form.entidad,onChange:fv('entidad')},OPT({value:''},'— Selecciona banco —'),...BANCOS_CO.map(b=>OPT({key:b,value:b},b)))),
              DIV(null,LBL({style:cLbl},'Saldo actual ($)'),INP({type:'number',value:form.saldo,onChange:fv('saldo'),placeholder:'1500000'})),
              DIV(null,LBL({style:cLbl},'Tasa EA (%)'),INP({type:'number',step:'.1',value:form.tasaEA,onChange:fv('tasaEA'),placeholder:'28.5'})),
              DIV(null,LBL({style:cLbl},'Cuotas pactadas'),INP({type:'number',value:form.cuotasTotales,onChange:fv('cuotasTotales'),placeholder:'36'})),
              DIV(null,LBL({style:cLbl},'Cuotas ya pagadas'),INP({type:'number',value:form.cuotasPagadas,onChange:fv('cuotasPagadas')}))
            ),
      DIV({style:{background:'var(--info-bg)',borderRadius:'var(--r-md)',padding:'10px 14px',marginTop:12,marginBottom:12,fontSize:12,color:'var(--info-txt)',lineHeight:1.6}},
        isDP?'👤 Deuda personal: sin banco ni tasa. Las cuotas restantes se calculan automáticamente con tasa 0%.'
        :isTC?'💳 TC: cuotas=0 → pago mínimo (interés+1%). Las compras sumarán al saldo automáticamente.'

      DIV({style:{display:'flex',gap:10}},BTN({style:{...cBtnS,flex:1},onClick:()=>setShow(false)},'Cancelar'),BTN({style:{...cBtnP,flex:2},onClick:doAdd},'Guardar producto'))

      )

    DIV({style:cG2},...diags.map(d=>DIV({key:d.t,style:cMC},P({style:{fontSize:12,color:'var(--txt2)',margin:'0 0 4px'}},d.t),P({style:{fontSize:19,fontWeight:500,margin:'0 0 4px'}},d.v),SPAN({style:bdg(d.s)},d.s==='ok'?'✅ OK':d.s==='warn'?'⚠️ Atención':'🔴 Crítico')))),
    DIV({style:{display:'flex',flexDirection:'column',gap:12}},...results.map(r=>
      DIV({key:r.id,style:{...cCard,borderLeft:`3px solid ${txtMap[r.status]}`}},
        DIV({style:{display:'flex',gap:12}},SPAN({style:{fontSize:24,lineHeight:1,flexShrink:0}},r.emoji),
          DIV({style:{flex:1}},
            DIV({style:{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}},P({style:{fontWeight:500,fontSize:14,margin:0}},r.title),SPAN({style:bdg(r.status)},r.status==='ok'?'Óptimo':r.status==='warn'?'Atención':'Crítico')),
            P({style:{fontSize:13,color:'var(--txt2)',margin:'0 0 10px',lineHeight:1.6}},r.desc),
            r.cuts&&r.cuts.length>0&&DIV({style:{background:'#fef0e8',borderRadius:'var(--r-md)',padding:'10px 12px',marginBottom:10}},
              P({style:{fontSize:12,fontWeight:600,color:'#8B4000',margin:'0 0 8px'}},'📋 Reducción sugerida por categoría:'),
              DIV({style:{overflowX:'auto'}},TABLE({style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
                THEAD(null,TR({style:{borderBottom:'.5px solid #e8c8a0'}},...['Categoría','Actual','Sugerido','Reducción'].map(h2=>TH({key:h2,style:{...cTh,color:'#8B4000',fontSize:11}},h2)))),
                TBODY(null,...r.cuts.map(c=>TR({key:c.nombre,style:{borderBottom:'.5px solid #f0d8b8'}},
                  TD({style:{...cTd,fontWeight:500}},[c.nombre]),TD({style:{...cTd,color:'var(--danger)'}},cop(c.actual)),
                  TD({style:{...cTd,color:'var(--success)',fontWeight:500}},cop(c.sugerido)),
                  TD({style:cTd},SPAN({style:{...bdg('danger'),fontSize:10}},`−${cop(c.corte)}`))
                ))),
                TFOOT(null,TR({style:{borderTop:'.5px solid #e8c8a0',background:'#fdebd0'}},
                  TD({style:{padding:'6px 8px',fontSize:11,fontWeight:600,color:'#8B4000'}},'TOTAL'),TD(null),TD(null),
                  TD({style:{...cTd,fontWeight:700,color:'var(--danger)'}},cop(r.cuts.reduce((s,c)=>s+c.corte,0)))
                ))
              ))
            ),
            DIV({style:{background:colorMap[r.status],borderRadius:'var(--r-sm)',padding:'8px 12px'}},P({style:{fontSize:12,color:txtMap[r.status],margin:0,lineHeight:1.6}},h('strong',null,'→ Acción: '),r.accion))
          )
        )
      )
    ))
  );
}

// ── Config ─────────────────────────────────────────────────────────────────
function Config(){
  const{data,dispatch}=useApp();
  const fld=(lb,key,extra={})=>DIV(null,LBL({style:cLbl},lb),INP({type:'number',...extra,value:data.params[key],onChange:e=>dispatch({type:'UPD_PARAM',key,val:+e.target.value||0})}));
  return DIV({style:{display:'flex',flexDirection:'column',gap:'1.5rem'}},
    h(SecTitle,{title:'Configuración'}),
    DIV({style:cCard},h(SecTitle,{title:'Ingresos y parámetros'}),DIV({style:cG3},fld('Salario base ($)','salarioBase'),fld('% Seg. Social','pctSS',{step:'.01'}),fld('Ing. adicional ($)','ingAdicional'),fld('TRM (COP/USD)','trm'),fld('Inflación EA','inflacion',{step:'.001'}),
      DIV(null,LBL({style:cLbl},'Efectivo ($)'),INP({type:'number',value:data.efectivo,onChange:e=>dispatch({type:'UPD_EFECTIVO',val:+e.target.value||0})}))
    )),
 DIV({style:cCard},
      h(SecTitle,{title:'Gestión de datos y Nube'}),
      DIV({style:{display:'flex', gap:10, flexWrap:'wrap', marginTop:10}},
        // Botón Azul para importar
        BTN({
          style:{...cBtnS, flex:1, background:'#4285F4', color:'#fff', border:'none', fontWeight:600, minWidth:'160px', padding:'10px'},
          onClick: loadDataFromSheets
        }, "📥 Importar de Google Sheets"),
        
        // Botón Rojo para resetear
        BTN({
          style:{...cBtnD, flex:1, minWidth:'160px', padding:'10px'},
          onClick:()=>{if(confirm('¿Restablecer todos los datos locales?')){dispatch({type:'RESET'});localStorage.removeItem(OKEY);}}
        }, "Restablecer Locales")
      ),
      P({style:{fontSize:11, color:'var(--txt3)', marginTop:8, fontStyle:'italic'}}, "💡 La sincronización hacia la nube es automática cada vez que realizas un cambio.")
    )
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const[data,dispatch]=useReducer(reducer,null,()=>loadLS()||DEF);
  const calc=useMemo(()=>calcAll(data),[data]);
  useEffect(()=>saveLS(data),[data]);
  useEffect(() => {
    if (data.movimientos && data.movimientos.length > 0) {
      const timer = setTimeout(() => {
        syncDataToSheets(data);
      }, 3000); 
      return () => clearTimeout(timer);
    }
  }, [data]);
  const[tab,setTab]=useState('dashboard');
  const[showOnboarding,setShowOnboarding]=useState(!wasOnboarded());
  const alertCount=useMemo(()=>RULES.map(r=>r.evaluate(calc,data)).filter(r=>r.status==='danger').length,[calc,data]);
  const TABS=[{id:'dashboard',l:'Dashboard'},{id:'creditos',l:'Créditos'},{id:'gastos',l:'Gastos'},{id:'movimientos',l:'Movimientos'},{id:'ahorro',l:'Ahorro'},{id:'inversiones',l:'Inversiones'},{id:'motor',l:'⚡ Motor'},{id:'config',l:'Configurar'}];
  const PAGES={dashboard:()=>h(Dashboard,{onGoToMotor:()=>setTab('motor')}),creditos:Creditos,gastos:Gastos,movimientos:Movimientos,ahorro:Ahorro,inversiones:Inversiones,motor:Motor,config:Config};
  return h(AppCtx.Provider,{value:{data,calc,dispatch}},
    DIV(null,
      showOnboarding&&h(Onboarding,{onComplete:()=>setShowOnboarding(false)}),
      DIV({className:'top-nav',style:{marginBottom:'1.25rem'}},
        DIV({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8,background:'linear-gradient(135deg,#0d1a2e 0%,#0f2444 60%,#0d1a2e 100%)',borderRadius:'var(--r-lg)',padding:'14px 20px',boxShadow:'0 4px 24px rgba(13,26,46,.35)'}},
          DIV({style:{display:'flex',alignItems:'center',gap:14}},
            // ── SHEENA Financial logo (SVG inline) ──
            h('svg',{width:52,height:52,viewBox:'0 0 52 52',xmlns:'http://www.w3.org/2000/svg'},
              h('defs',null,
                h('linearGradient',{id:'lg1',x1:'0%',y1:'0%',x2:'100%',y2:'100%'},
                  h('stop',{offset:'0%',stopColor:'#4ABFFF'}),h('stop',{offset:'100%',stopColor:'#1A6FD4'})
                ),
                h('linearGradient',{id:'lg2',x1:'0%',y1:'0%',x2:'100%',y2:'100%'},
                  h('stop',{offset:'0%',stopColor:'#FFD060'}),h('stop',{offset:'100%',stopColor:'#F47B00'})
                ),
                h('filter',{id:'glow'},
                  h('feGaussianBlur',{stdDeviation:'1.5',result:'blur'}),
                  h('feComposite',{in:'SourceGraphic',in2:'blur',operator:'over'})
                )
              ),
              // Triángulo izquierdo azul
              h('polygon',{points:'8,46 26,6 26,46',fill:'url(#lg1)',opacity:'.95'}),
              // Triángulo derecho naranja
              h('polygon',{points:'26,6 44,46 26,46',fill:'url(#lg2)',opacity:'.95'}),
              // Recorte centro (forma A interna)
              h('polygon',{points:'26,18 20,46 32,46',fill:'#0d1a2e'}),
              // Brillo superior
              h('polygon',{points:'24,6 26,6 27,10 25,10',fill:'#fff',opacity:'.5'}),
              // Línea divisora
              h('line',{x1:'26',y1:'10',x2:'26',y2:'46',stroke:'#0d1a2e',strokeWidth:'1.5'})
            ),
            DIV(null,
              h('div',{style:{fontSize:20,fontWeight:800,color:'#fff',letterSpacing:1,lineHeight:1,fontFamily:'system-ui,sans-serif',textShadow:'0 2px 8px rgba(74,191,255,.3)'}},'SHEENA'),
              h('div',{style:{fontSize:13,fontWeight:400,color:'#4ABFFF',letterSpacing:3,lineHeight:1.2,fontFamily:'system-ui,sans-serif'},'data-text':'Financial'},'Financial')
            )
          ),
          alertCount>0&&BTN({style:{...cBtnD,fontSize:12,display:'flex',alignItems:'center',gap:6,border:'.5px solid rgba(224,160,160,.5)',color:'#ff9090'},onClick:()=>setTab('motor')},SPAN({style:{animation:'pulse 1.5s infinite',display:'inline-block'}},'🚨'),`${alertCount} alerta${alertCount>1?'s':''}`)
        ),
        DIV({style:{display:'flex',gap:4,flexWrap:'wrap',background:'var(--bg2)',padding:4,borderRadius:'var(--r-lg)'}},
          ...TABS.map(t=>BTN({key:t.id,style:tabSt(tab===t.id),onClick:()=>setTab(t.id)},t.id==='motor'&&alertCount>0?`${t.l} (${alertCount})`:t.l))
        )
      ),
      h(PAGES[tab]||PAGES.dashboard),
      DIV({className:'bnav'},
        ...TABS.map(t=>BTN({key:t.id,className:tab===t.id?'on':'',onClick:()=>setTab(t.id)},
          DIV({className:'nav-icon'},TAB_ICONS[t.id]),SPAN(null,t.id==='motor'&&alertCount>0?`Motor(${alertCount})`:TAB_LABELS[t.id])
        ))
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
